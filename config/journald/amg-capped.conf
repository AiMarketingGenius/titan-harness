# Drop-in at /etc/systemd/journald.conf.d/amg-capped.conf
# Owner: AMG / Item 6 audit 2026-04-14.
#
# Current journald usage: 928MB across archived+active journals (no
# SystemMaxUse cap set). Caps to 500MB max + 30d retention so journal
# doesn't bloat /var/log unbounded.
#
# Apply: systemctl restart systemd-journald after writing.
# Rollback: rm /etc/systemd/journald.conf.d/amg-capped.conf && systemctl
# restart systemd-journald.

[Journal]
SystemMaxUse=500M
SystemKeepFree=2G
SystemMaxFileSize=50M
SystemMaxFiles=20
MaxRetentionSec=30day
MaxFileSec=1day

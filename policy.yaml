# titan-harness/policy.yaml
# Policy-as-code for the titan-harness. Phase G.2 — externalized config
# so behavior can be tuned without touching bash scripts.
#
# All hooks and helper scripts read from this file via install.sh, which
# exports relevant keys into ~/.titan-env so shell scripts can consume
# them at runtime. Re-run install.sh after editing this file.
#
# Document version: 1.0
# Last updated: 2026-04-10

#
# CORE CONTRACT: capacity block REQUIRED and non-bypassable
# --------------------------------------------------------
# Any deployment of the titan-harness (AMG, client "Titan as COO" instances,
# Solon OS core, Atlas Machine pipelines) MUST include a populated capacity:
# block. policy-loader.sh validates presence; harness-preflight.sh blocks any
# runner whose capacity gate is not wired.
#
# Non-optional keys: see `capacity:` block at bottom of this file.
#
version: "1.0"

# --- Instance / environment ---
harness:
  project_id: "EOM"           # default project tag for captured state
  session_dir_linux: "/opt/titan-session"
  session_dir_macos: "$HOME/titan-session"

# --- PreToolUse gate (existing hook) ---
pre_tool_gate:
  blocked_tools: ["Write", "Edit", "NotebookEdit"]
  require_active_task: true   # tools above need ACTIVE_TASK_ID set
  bypass_file: ".gate_bypass"

# --- Idea capture (UserPromptSubmit hook) ---
idea_capture:
  enabled: true
  trigger_phrase: "lock it"        # change here to alter the trigger
  emoji_trigger: "🔒"              # iPhone-friendly alternative
  target_table: "ideas"
  default_project: "EOM"
  # Empty-idea behavior: warn and skip (no transcript scraping)
  empty_behavior: "warn-and-skip"
  # Secret sanitization patterns (hook redacts these before queueing)
  redact_patterns:
    - name: "openai-key"
      pattern: 'sk-[A-Za-z0-9_-]{20,}'
      replacement: "[REDACTED_SK]"
    - name: "shopify-token"
      pattern: 'shp(ss|at|ca)_[A-Za-z0-9_-]{20,}'
      replacement: "[REDACTED_SHOPIFY]"
    - name: "jwt"
      pattern: 'eyJ[A-Za-z0-9_=-]{40,}\.[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+'
      replacement: "[REDACTED_JWT]"
    - name: "aws-key"
      pattern: 'AKIA[0-9A-Z]{16}'
      replacement: "[REDACTED_AWS]"
    - name: "github-token"
      pattern: 'ghp_[A-Za-z0-9]{30,}'
      replacement: "[REDACTED_GH]"
    - name: "google-key"
      pattern: 'AIza[0-9A-Za-z_-]{30,}'
      replacement: "[REDACTED_GOOGLE]"
    - name: "email"
      pattern: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
      replacement: "[REDACTED_EMAIL]"
  # Dedup: hash-based + DB UNIQUE constraint
  dedup:
    local_queue_lookback: 10   # check last N queue lines before appending
    # DB-layer constraint: UNIQUE (idea_hash, created_at::date)
    # Configured in sql/001_ideas_table.sql

# --- Idea drainer (systemd timer / launchd plist) ---
idea_drain:
  interval_seconds: 60
  concurrency_lock_stale_seconds: 300
  http_timeout_seconds: 8
  success_http_codes: [200, 201, 204]
  dedup_http_code: 409         # DB unique-violation = idempotent success
  slack:
    enabled: true              # Slack ping fires AFTER successful insert
    webhook_env: "IDEA_SLACK_WEBHOOK"   # or falls back to SLACK_WEBHOOK_URL
    template: "🔒 Idea locked by {instance}: *{title}*\n> id: {id}"
    timeout_seconds: 4

# --- Security (Phase G.2 — using service role; G.2.5 will migrate to RLS) ---
security:
  auth_mode: "service_role"          # current: single service role key
  # TODO G.2.5: implement Row Level Security with scoped JWT claims
  # ideas_writer_jwt_claim: "role=ideas_writer"
  # See sql/002_ideas_rls.sql (not yet written)

# --- Install test mode ---
install_test:
  enabled: true
  mock_prompt: "install test from titan — lock it: titan-harness install verification"
  verification_timeout_seconds: 90
  cleanup_after_test: true

# --- War Room (Phase G.3 — SHIPPED 2026-04-10, upgraded to A-grade floor) ---
# The war room is the automated Titan ↔ Perplexity back-and-forth loop that
# grades plans/designs/phase-closures until convergence. Runs synchronously
# in-session (via perplexity_review MCP tool) AND from the autonomous
# titan-queue-watcher daemon on the VPS (via lib/war_room.py direct API call).
#
# AMG QUALITY FLOOR (Solon directive 2026-04-10): every deliverable must
# hit 9.4-9.5 out of 10, which maps to war-room grade A. B is a failure
# and must be rewritten and re-graded. Only A is acceptable.
war_room:
  enabled: true                      # Phase G.3 shipped 2026-04-10
  model: "sonar-pro"                 # Perplexity model — see api.perplexity.ai/docs
  min_acceptable_grade: "A"          # AMG 9.4/10 floor — A = 9.5-10, B = FAIL
  max_refinement_rounds: 5           # extra headroom to push past B → A
  log_table: "war_room_exchanges"
  slack_channel: "#amg-war-room"
  auto_trigger_on:
    - "phase_completion"             # end of any Phase X.Y
    - "plan_finalization"            # before marking a plan "locked"
    - "architecture_decision"        # multi-option design calls
  require_passing_grade_before_lock: true
  cost_ceiling_cents_per_exchange: 50   # $0.50/review — Sonnet reviser is pricier than Haiku
  reviser_model: "claude-sonnet-4-6"    # upgraded from Haiku — need Sonnet-grade revisions to reach A

  # --- Slack-based Perplexity grading (2026-04-11 blocker mitigation) ---
  # When the direct Perplexity API runs out of quota (observed 2026-04-11),
  # war-room grading can route through the Perplexity Slack app instead.
  # Flow: Titan posts the grading prompt to slack_grading_channel, @mentions
  # the Perplexity bot, polls conversations.replies until the bot replies
  # in-thread, parses the reply back into a GradeResult. Slower than the
  # direct API (~30-90s per round including poll) but bypasses the API
  # quota entirely and creates a human-auditable grading channel.
  #
  # DISABLED by default — enable only after:
  #   (1) Perplexity Slack app is installed to the AMG workspace
  #   (2) SLACK_BOT_TOKEN (xoxb-...) is set in /root/.titan-env
  #   (3) slack_grading_channel_id is populated (a C-prefixed channel ID)
  #   (4) slack_grading_bot_user_id is populated (U-prefixed Perplexity bot user)
  slack_grading_enabled: false
  slack_grading_channel_name: "#titan-perplexity-warroom"
  slack_grading_channel_id: ""          # Cxxxxxxxxxx — populate after channel created
  slack_grading_bot_user_id: ""         # Uxxxxxxxxxx — populate after Perplexity app installed
  slack_grading_poll_interval_s: 3      # poll conversations.replies every N seconds
  slack_grading_timeout_s: 180          # max wait for Perplexity's reply per round
  slack_grading_privacy_mode: "strict"  # strict = refuse to post credentials/PII/client data

# --- MP (megaprompt) runs — Phase G.4 ---
# Wraps MP-1 harvest and MP-2 synthesis under the harness so every phase
# execution is tracked in public.mp_runs, war-roomed when it produces a
# planning output, and scoped by project_id for multi-tenancy.
#
# This block is read by bin/mp-runner.sh + bin/mp-status.sh + bin/mp-resume.sh.
mp_runs:
  enabled: true                        # Phase G.4 shipped 2026-04-10
  default_project: "EOM"
  log_table: "mp_runs"
  log_dir: "/var/log/mp-runs"
  slack_channel: "#amg-mp-runs"
  # Per-megaprompt API spend ceilings. Enforced by the runner before it
  # delegates to the underlying script. A hard exit fires if the prior
  # ceiling has already been hit.
  spend_hard_cap_usd: 150              # matches MP-2 megaprompt doctrine
  spend_soft_alert_usd: 75
  spend_hard_alert_usd: 135
  # Phases that are expected to produce a planning/synthesis doc. The runner
  # will auto-war-room these outputs. Anything NOT in this list is treated
  # as raw harvest and skips the war room.
  war_room_phases:
    - "mp1.8"                          # manifest consolidator summary
    - "mp2.1"                          # corpus audit report
    - "mp2.2"                          # voice extraction blueprint
    - "mp2.3"                          # sales playbook
    - "mp2.4"                          # decision framework
    - "mp2.5"                          # operational patterns
    - "mp2.6"                          # SOP codification
    - "mp2.7"                          # heldout validation report
  # Slack noise: runner only pings on 'failed' or 'blocked' status.
  # War-room C-or-below pings are handled independently by lib/war_room.py.
  notify_on_status:
    - "failed"
    - "blocked"

# --- Capacity / parallelism ceilings (Phase G.5 — max safe ops, VPS=12c/64G) ---
# These are treated as global operating limits by every runner, queue watcher,
# and n8n workflow. Enforced by lib/policy-loader.sh exports + bin/check-capacity.sh.
capacity:
  # Claude / Titan sessions
  max_claude_sessions: 12            # hard ceiling on concurrent Claude Code sessions
  max_heavy_tasks: 8                 # plans, MP-2 synthesis, big war-room docs

  # n8n workflows
  max_n8n_branches_per_workflow: 20
  max_concurrent_heavy_workflows: 3

  # Workers / sub-agents
  max_workers_general: 10
  max_workers_cpu_heavy: 4

  # LLM batching
  max_llm_batch_size: 15
  max_concurrent_llm_batches: 8

  # CPU / RAM guardrails
  cpu_soft_limit_percent: 80         # soft: no new heavy tasks
  cpu_hard_limit_percent: 90         # hard: block/queue all new heavy work
  ram_soft_limit_gib: 50             # soft: no new heavy workflows
  ram_hard_limit_gib: 56             # hard: suspend non-critical workers


# --- Model routing (Phase P3) ------------------------------------------------
# Canonical task_type -> model_group map. Consumed by lib/model_router.py.
# Cost-aware: Haiku for transforms/classify, Sonnet for synthesis, Opus for
# plan/architecture, Perplexity sonar-pro for war-room grading.
models:
  default: "claude-sonnet-4-6"
  routing:
    transform:        "claude-haiku-4-5"
    classify:         "claude-haiku-4-5"
    extract:          "claude-haiku-4-5"
    summarize_short:  "claude-haiku-4-5"
    summarize_long:   "claude-sonnet-4-6"
    synthesis:        "claude-sonnet-4-6"
    plan:             "claude-opus-4-6"
    architecture:     "claude-opus-4-6"
    spec:             "claude-opus-4-6"
    war_room_grade:   "sonar-pro"
    war_room_revise:  "claude-opus-4-6"
    phase:            "claude-sonnet-4-6"
    research:         "sonar-pro"
    review:           "claude-sonnet-4-6"
    embedding:        "nomic-embed-text"


# --- Fast Mode default (Phase P11 — Solon blaze directive) ------------------
# Fast Mode is the default for every Claude Code session bound to this harness.
# Exceptions opt-out by task_type. Every opt-out is logged to fast_mode_events.
fast_mode:
  default: "on"
  exception_task_types:
    - plan
    - architecture
    - war_room_revise
    - deep_debug
  exception_cli_flag: "--normal-mode"

# --- Blaze Mode conversational contract (Phase P11 — Solon blaze directive) ---
# Applies to every interaction between Titan and Solon. Capacity + speed
# non-negotiable. Latency first, terse, parallel thinking internal, stream
# output, no self-narration.
blaze_mode:
  enabled: true
  scope: "all_solon_interactions"
  latency_first: true
  suppress_preamble: true
  suppress_self_narration: true
  parallel_thinking: true
  stream_by_default: true
  effort_map:
    simple:    "fast_short"
    strategic: "concise_deeper"
  heavy_analysis_only_on_request: true
  trigger_phrases_for_deep_mode:
    - "go deep"
    - "war room this"
    - "deep dive"

# --- IDEA → DR → PLAN → EXECUTE pipeline (Section 7 of CORE_CONTRACT) -------
idea_to_execution:
  enabled: true
  default_project: "EOM"
  poll_interval_seconds: 120
  max_phases_per_cycle: 1
  max_concurrent_runs: 3
  slack_events: ["dr_complete", "phase_a_graded", "needs_solon_override"]
  disabled_project_ids: []
  allowed_task_types:
    - plan
    - blueprint
    - performance
    - infra
    - mp1
    - mp2
    - atlas

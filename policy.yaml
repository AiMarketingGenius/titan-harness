# titan-harness/policy.yaml
# Policy-as-code for the titan-harness. Phase G.2 — externalized config
# so behavior can be tuned without touching bash scripts.
#
# All hooks and helper scripts read from this file via install.sh, which
# exports relevant keys into ~/.titan-env so shell scripts can consume
# them at runtime. Re-run install.sh after editing this file.
#
# Document version: 1.0
# Last updated: 2026-04-10

#
# CORE CONTRACT: capacity block REQUIRED and non-bypassable
# --------------------------------------------------------
# Any deployment of the titan-harness (AMG, client "Titan as COO" instances,
# Solon OS core, Atlas Machine pipelines) MUST include a populated capacity:
# block. policy-loader.sh validates presence; harness-preflight.sh blocks any
# runner whose capacity gate is not wired.
#
# Non-optional keys: see `capacity:` block at bottom of this file.
#
version: "1.0"

# --- Instance / environment ---
harness:
  project_id: "EOM"           # default project tag for captured state
  session_dir_linux: "/opt/titan-session"
  session_dir_macos: "$HOME/titan-session"

# --- PreToolUse gate (existing hook) ---
pre_tool_gate:
  blocked_tools: ["Write", "Edit", "NotebookEdit"]
  require_active_task: true   # tools above need ACTIVE_TASK_ID set
  bypass_file: ".gate_bypass"

# --- Idea capture (UserPromptSubmit hook) ---
idea_capture:
  enabled: true
  trigger_phrase: "lock it"        # change here to alter the trigger
  emoji_trigger: "🔒"              # iPhone-friendly alternative
  target_table: "ideas"
  default_project: "EOM"
  # Empty-idea behavior: warn and skip (no transcript scraping)
  empty_behavior: "warn-and-skip"
  # Secret sanitization patterns (hook redacts these before queueing)
  redact_patterns:
    - name: "openai-key"
      pattern: 'sk-[A-Za-z0-9_-]{20,}'
      replacement: "[REDACTED_SK]"
    - name: "shopify-token"
      pattern: 'shp(ss|at|ca)_[A-Za-z0-9_-]{20,}'
      replacement: "[REDACTED_SHOPIFY]"
    - name: "jwt"
      pattern: 'eyJ[A-Za-z0-9_=-]{40,}\.[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+'
      replacement: "[REDACTED_JWT]"
    - name: "aws-key"
      pattern: 'AKIA[0-9A-Z]{16}'
      replacement: "[REDACTED_AWS]"
    - name: "github-token"
      pattern: 'ghp_[A-Za-z0-9]{30,}'
      replacement: "[REDACTED_GH]"
    - name: "google-key"
      pattern: 'AIza[0-9A-Za-z_-]{30,}'
      replacement: "[REDACTED_GOOGLE]"
    - name: "email"
      pattern: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
      replacement: "[REDACTED_EMAIL]"
  # Dedup: hash-based + DB UNIQUE constraint
  dedup:
    local_queue_lookback: 10   # check last N queue lines before appending
    # DB-layer constraint: UNIQUE (idea_hash, created_at::date)
    # Configured in sql/001_ideas_table.sql

# --- Idea drainer (systemd timer / launchd plist) ---
idea_drain:
  interval_seconds: 60
  concurrency_lock_stale_seconds: 300
  http_timeout_seconds: 8
  success_http_codes: [200, 201, 204]
  dedup_http_code: 409         # DB unique-violation = idempotent success
  slack:
    enabled: true              # Slack ping fires AFTER successful insert
    webhook_env: "IDEA_SLACK_WEBHOOK"   # or falls back to SLACK_WEBHOOK_URL
    template: "🔒 Idea locked by {instance}: *{title}*\n> id: {id}"
    timeout_seconds: 4

# --- Security (Phase G.2 — using service role; G.2.5 will migrate to RLS) ---
security:
  auth_mode: "service_role"          # current: single service role key
  # TODO G.2.5: implement Row Level Security with scoped JWT claims
  # ideas_writer_jwt_claim: "role=ideas_writer"
  # See sql/002_ideas_rls.sql (not yet written)

# --- Install test mode ---
install_test:
  enabled: true
  mock_prompt: "install test from titan — lock it: titan-harness install verification"
  verification_timeout_seconds: 90
  cleanup_after_test: true

# --- War Room (Phase G.3 — SHIPPED 2026-04-10, upgraded to A-grade floor) ---
# The war room is the automated Titan ↔ Perplexity back-and-forth loop that
# grades plans/designs/phase-closures until convergence. Runs synchronously
# in-session (via perplexity_review MCP tool) AND from the autonomous
# titan-queue-watcher daemon on the VPS (via lib/war_room.py direct API call).
#
# AMG QUALITY FLOOR (Solon directive 2026-04-10): every deliverable must
# hit 9.4-9.5 out of 10, which maps to war-room grade A. B is a failure
# and must be rewritten and re-graded. Only A is acceptable.
war_room:
  enabled: true                      # Phase G.3 shipped 2026-04-10
  model: "sonar-pro"                 # Perplexity model — see api.perplexity.ai/docs
  min_acceptable_grade: "A"          # AMG 9.4/10 floor — A = 9.5-10, B = FAIL
  max_refinement_rounds: 5           # extra headroom to push past B → A
  log_table: "war_room_exchanges"
  slack_channel: "#amg-war-room"
  auto_trigger_on:
    - "phase_completion"             # end of any Phase X.Y
    - "plan_finalization"            # before marking a plan "locked"
    - "architecture_decision"        # multi-option design calls
  require_passing_grade_before_lock: true
  cost_ceiling_cents_per_exchange: 50   # $0.50/review — Sonnet reviser is pricier than Haiku
  reviser_model: "claude-sonnet-4-6"    # upgraded from Haiku — need Sonnet-grade revisions to reach A

  # --- Slack-based Perplexity grading (2026-04-11 blocker mitigation) ---
  # When the direct Perplexity API runs out of quota (observed 2026-04-11),
  # war-room grading can route through the Perplexity Slack app instead.
  # Flow: Titan posts the grading prompt to slack_grading_channel, @mentions
  # the Perplexity bot, polls conversations.replies until the bot replies
  # in-thread, parses the reply back into a GradeResult. Slower than the
  # direct API (~30-90s per round including poll) but bypasses the API
  # quota entirely and creates a human-auditable grading channel.
  #
  # DISABLED by default — enable only after:
  #   (1) Perplexity Slack app is installed to the AMG workspace
  #   (2) SLACK_BOT_TOKEN (xoxb-...) is set in /root/.titan-env
  #   (3) slack_grading_channel_id is populated (a C-prefixed channel ID)
  #   (4) slack_grading_bot_user_id is populated (U-prefixed Perplexity bot user)
  slack_grading_enabled: false
  slack_grading_channel_name: "#titan-perplexity-warroom"
  slack_grading_channel_id: ""          # Cxxxxxxxxxx — populate after channel created
  slack_grading_bot_user_id: ""         # Uxxxxxxxxxx — populate after Perplexity app installed
  slack_grading_poll_interval_s: 3      # poll conversations.replies every N seconds
  slack_grading_timeout_s: 180          # max wait for Perplexity's reply per round
  slack_grading_privacy_mode: "strict"  # strict = refuse to post credentials/PII/client data

# --- MP (megaprompt) runs — Phase G.4 ---
# Wraps MP-1 harvest and MP-2 synthesis under the harness so every phase
# execution is tracked in public.mp_runs, war-roomed when it produces a
# planning output, and scoped by project_id for multi-tenancy.
#
# This block is read by bin/mp-runner.sh + bin/mp-status.sh + bin/mp-resume.sh.
mp_runs:
  enabled: true                        # Phase G.4 shipped 2026-04-10
  default_project: "EOM"
  log_table: "mp_runs"
  log_dir: "/var/log/mp-runs"
  slack_channel: "#amg-mp-runs"
  # Per-megaprompt API spend ceilings. Enforced by the runner before it
  # delegates to the underlying script. A hard exit fires if the prior
  # ceiling has already been hit.
  spend_hard_cap_usd: 150              # matches MP-2 megaprompt doctrine
  spend_soft_alert_usd: 75
  spend_hard_alert_usd: 135
  # Phases that are expected to produce a planning/synthesis doc. The runner
  # will auto-war-room these outputs. Anything NOT in this list is treated
  # as raw harvest and skips the war room.
  war_room_phases:
    - "mp1.8"                          # manifest consolidator summary
    - "mp2.1"                          # corpus audit report
    - "mp2.2"                          # voice extraction blueprint
    - "mp2.3"                          # sales playbook
    - "mp2.4"                          # decision framework
    - "mp2.5"                          # operational patterns
    - "mp2.6"                          # SOP codification
    - "mp2.7"                          # heldout validation report
  # Slack noise: runner only pings on 'failed' or 'blocked' status.
  # War-room C-or-below pings are handled independently by lib/war_room.py.
  notify_on_status:
    - "failed"
    - "blocked"

# --- Capacity / parallelism ceilings (Phase G.5 — max safe ops, VPS=12c/64G) ---
# These are treated as global operating limits by every runner, queue watcher,
# and n8n workflow. Enforced by lib/policy-loader.sh exports + bin/check-capacity.sh.
capacity:
  # Claude / Titan sessions
  max_claude_sessions: 12            # hard ceiling on concurrent Claude Code sessions
  max_heavy_tasks: 8                 # plans, MP-2 synthesis, big war-room docs

  # n8n workflows
  max_n8n_branches_per_workflow: 20
  max_concurrent_heavy_workflows: 3

  # Workers / sub-agents
  max_workers_general: 10
  max_workers_cpu_heavy: 4

  # LLM batching
  max_llm_batch_size: 15
  max_concurrent_llm_batches: 8

  # CPU / RAM guardrails
  cpu_soft_limit_percent: 80         # soft: no new heavy tasks
  cpu_hard_limit_percent: 90         # hard: block/queue all new heavy work
  ram_soft_limit_gib: 50             # soft: no new heavy workflows
  ram_hard_limit_gib: 56             # hard: suspend non-critical workers


# --- Model routing (Phase P3) ------------------------------------------------
# Canonical task_type -> model_group map. Consumed by lib/model_router.py.
# Cost-aware: Haiku for transforms/classify, Sonnet for synthesis, Opus for
# plan/architecture, Perplexity sonar-pro for war-room grading.
models:
  default: "claude-sonnet-4-6"
  routing:
    transform:        "claude-haiku-4-5"
    classify:         "claude-haiku-4-5"
    extract:          "claude-haiku-4-5"
    summarize_short:  "claude-haiku-4-5"
    summarize_long:   "claude-sonnet-4-6"
    synthesis:        "claude-sonnet-4-6"
    plan:             "claude-opus-4-6"
    architecture:     "claude-opus-4-6"
    spec:             "claude-opus-4-6"
    war_room_grade:   "sonar-pro"
    war_room_revise:  "claude-opus-4-6"
    phase:            "claude-sonnet-4-6"
    research:         "sonar-pro"
    review:           "claude-sonnet-4-6"
    embedding:        "nomic-embed-text"


# --- Fast Mode default (Phase P11 — Solon blaze directive) ------------------
# Fast Mode is the default for every Claude Code session bound to this harness.
# Exceptions opt-out by task_type. Every opt-out is logged to fast_mode_events.
fast_mode:
  default: "on"
  exception_task_types:
    - plan
    - architecture
    - war_room_revise
    - deep_debug
  exception_cli_flag: "--normal-mode"

# --- Blaze Mode conversational contract (Phase P11 — Solon blaze directive) ---
# Applies to every interaction between Titan and Solon. Capacity + speed
# non-negotiable. Latency first, terse, parallel thinking internal, stream
# output, no self-narration.
blaze_mode:
  enabled: true
  scope: "all_solon_interactions"
  latency_first: true
  suppress_preamble: true
  suppress_self_narration: true
  parallel_thinking: true
  stream_by_default: true
  effort_map:
    simple:    "fast_short"
    strategic: "concise_deeper"
  heavy_analysis_only_on_request: true
  trigger_phrases_for_deep_mode:
    - "go deep"
    - "war room this"
    - "deep dive"

# --- IDEA → DR → PLAN → EXECUTE pipeline (Section 7 of CORE_CONTRACT) -------
idea_to_execution:
  enabled: true
  default_project: "EOM"
  poll_interval_seconds: 120
  max_phases_per_cycle: 1
  max_concurrent_runs: 3
  slack_events: ["dr_complete", "phase_a_graded", "needs_solon_override"]
  disabled_project_ids: []
  allowed_task_types:
    - plan
    - blueprint
    - performance
    - infra
    - mp1
    - mp2
    - atlas

# --- Autopilot Suite — 5 automation threads (2026-04-11 overnight DR run) ---
# Each sub-block is an independent kill switch. All default DISABLED; Solon
# flips to enabled after the corresponding Solon action items are cleared.
# See INVENTORY.md section 12 for the gap map and plans/PLAN_2026-04-11_*.md
# for per-thread DRs. Stubs ship in lib/sales_inbox.py, lib/proposal_spec_generator.py,
# lib/marketing_engine.py, lib/back_office.py, lib/client_reporting.py.
autopilot:
  # Thread 1 — Sales Inbox + CRM Agent
  sales_inbox_enabled: false
  sales_inbox_draft_enabled: false       # partial disable: keep classify + brief, disable drafts
  sales_inbox_pubsub_topic: "projects/amg-titan/topics/titan-sales-inbox"
  sales_inbox_gmail_label_prefix: "titan/"
  sales_inbox_label_drafted: "titan/drafted"
  sales_inbox_cadence_cron: "0 8 * * *"  # daily 08:00 local
  sales_inbox_precall_poll_cron: "*/15 * * * *"
  sales_inbox_precall_lead_minutes: 30   # T-minus minutes before meeting
  sales_inbox_max_nudges_per_lead: 4
  sales_inbox_breakup_nudge_index: 5
  sales_inbox_voice_seeds_dir: "/opt/amg-titan/voice-seeds"
  sales_inbox_data_retention_days: 90    # raw bodies dropped after N days

  # Thread 2 — Proposal Spec Generator (small gap; reuses build_proposal.py)
  proposal_from_notes_enabled: false
  proposal_from_notes_war_room: true     # A-grade floor on generated spec
  proposal_from_notes_max_revisions: 2
  proposal_from_notes_exit_code_incomplete: 6
  proposal_from_notes_fireflies_corpus: "/opt/amg-titan/solon-corpus/fireflies/transcripts"

  # Thread 3 — Recurring Marketing Engine
  marketing_engine_enabled: false
  marketing_engine_cadence_cron: "0 6 * * 1"   # Monday 06:00 local pull
  marketing_engine_approval_timeout_s: 14400   # 4 hours before auto-hold
  marketing_engine_max_regen: 2
  marketing_engine_targets:
    linkedin_org_urn: ""                 # Solon action — populate after OAuth
    x_handle: ""
    email_sender: ""                     # e.g. solon@aimarketinggenius.io
    email_list_name: ""                  # e.g. 'amg-weekly' in provider's list
  marketing_engine_video_backend: "opus_clip"  # 'opus_clip' | 'heygen' | 'none'
  marketing_engine_publish_schedule:
    email_cron: "0 9 * * 1"              # Monday 09:00
    linkedin_cron: "0 10 * * 2"          # Tuesday 10:00
    x_cron: "5 10 * * 2"                 # Tuesday 10:05
    video_cron: "0 10 * * 3"             # Wednesday 10:00

  # Thread 4 — Back-Office Autopilot
  back_office_enabled: false
  back_office_cadence_cron: "0 19 * * 0" # Sunday 19:00 local weekly report
  back_office_paypal_drop_dir: "/opt/amg-titan/paypal-exports"
  back_office_tolerance_amount_pct: 5    # >5% variance triggers flag
  back_office_tolerance_days: 5          # ±5 days on due date window
  back_office_churn_threshold_consecutive_missed: 2
  back_office_stale_import_warning_days: 7

  # Thread 5 — Client Reporting Autopilot
  client_reporting_enabled: false
  client_reporting_default_cadence_cron: "0 9 1 * *"  # 1st of month 09:00
  client_reporting_auto_ship_unlock_after: 4          # consecutive approved reports
  client_reporting_auto_ship_veto_window_hours: 24
  client_reporting_service_account_path: "/opt/titan-harness-secrets/gcp-service-account.json"
  client_reporting_email_sender: ""      # Solon action — populate

  # --- RADAR + Solon OS Control Loop (shipped 2026-04-11 per Solon mega directive) ---
  # Default execution pull order — what Titan grabs when no explicit override.
  execution_priority:
    - "sales_inbox_autopilot"      # Thread 1
    - "mp1_mp2_harvest_synthesis"  # MP-1 harvest → MP-2 synthesis
    - "atlas_p1_client_experience" # Atlas Pillar 1

  # RADAR auto-refresh — runs every session boot + daily cron
  radar_enabled: true
  radar_refresh_cron: "*/30 * * * *"    # every 30 min refresh of timestamps
  radar_parked_days_threshold: 7        # items stale >N days surface to Solon
  radar_path: "RADAR.md"
  radar_summary_path: "RADAR_SUMMARY.md"

  # Solon OS daily control loop — morning package Perplexity ingests
  control_loop_enabled: false           # auto-flipped true once Slack war-room is wired
  control_loop_cron: "0 7 * * *"        # 07:00 server time daily
  control_loop_output_dir: "plans/control-loop"
  control_loop_slack_channel: "#titan-perplexity-warroom"
  control_loop_tag_format: "SOLON_OS_CONTROL_LOOP / {date}"

  # Parked-on-purpose (do NOT auto-start, do NOT forget)
  p91_docker_worker_pool_soak_enabled: false    # 60h canary PARKED per 2026-04-11 directive
  n8n_queue_mode_cutover_enabled: false         # PARKED per 2026-04-11 directive

  # --- Reviewer Loop transport config (CORE_CONTRACT §0.8, DR §9, 2026-04-12) ---
  # Fully-automated Reviewer Loop per Solon directive: no manual copy-paste.
  # Titan first tries Slack-Computer (uses Perplexity Pro credits), falls back
  # to Perplexity API with hard monthly budget, fails closed if both unavailable.
  reviewer:
    enabled: true
    fallback_order:
      - "slack-computer"    # preferred — #titan-aristotle, uses Pro credits
      - "perplexity-api"    # fallback — api.perplexity.ai, monthly budget gated
    api_monthly_budget_usd: 20.0    # hard cap, fail-closed if exceeded
    api_spend_log: "/var/log/titan/perplexity-api-spend.jsonl"
    slack_channel: "#titan-aristotle"
    slack_config_path: "/root/.infisical/slack-config.json"
    slack_poll_interval_seconds: 3
    slack_poll_timeout_seconds: 120
    # Auto-discover reviewer bot at setup time (Perplexity Computer > Ask > other)
    slack_reviewer_auto_discover: true

  # --- Aristotle (Perplexity-in-Slack) first-class agent integration ---
  # Per Solon directive 2026-04-11 Part 2: treat Aristotle as a first-class
  # co-agent. Titan auto-posts material updates to INVENTORY/RADAR/DRs and
  # the daily Solon OS Control Loop bundle to the dedicated channel below.
  # Titan defaults to ask_aristotle() for research/grading/doctrine help
  # rather than the direct Perplexity API (which is quota-blocked anyway).
  #
  # Enable once Solon has (a) installed Perplexity Slack app to AMG
  # workspace, (b) created the channel, (c) invited the Perplexity bot,
  # (d) created a bot token with scopes chat:write + channels:history +
  # groups:history, (e) populated channel_id and bot_user_id below.
  aristotle_enabled: false
  aristotle_channel_name: "#titan-aristotle"
  aristotle_channel_id: ""            # Cxxxxxxxxxx — populate after channel created
  aristotle_bot_user_id: ""           # Uxxxxxxxxxx — populate after Perplexity app installed
  aristotle_privacy_mode: "strict"    # same scan as war_room_slack
  aristotle_auto_post_on:
    - "inventory_material_update"
    - "radar_material_update"
    - "dr_shipped"
    - "control_loop_daily"
    - "major_commit_on_master"
  aristotle_ask_timeout_s: 300

# --- Never-Stop Autonomy (CORE_CONTRACT §8, added 2026-04-12) ----------------
# Titan never parks non-interactive work on "awaiting Solon." See
# plans/DOCTRINE_SOLON_STYLE_THINKING.md for the full framework and
# plans/PLAN_2026-04-12_vps-scheduler-night-grind.md for the scheduler DR.
autonomy:
  enabled: true
  never_stop_rule: true
  solon_style_thinking: true
  max_autonomous_cost_usd_per_month: 50     # hard limit #6 — above this, surface to Solon
  hard_limits:
    - "new_credentials_or_2fa"
    - "legal_or_financial_commitments"
    - "irreversible_business_decisions"
    - "external_communications_as_solon"
    - "destructive_data_operations"
    - "new_recurring_costs_over_threshold"
    - "public_facing_changes"
    - "greek_codename_locks_affecting_branding"

# --- VPS Scheduler / Night Grind Window (CORE_CONTRACT §8.3, added 2026-04-12) ----
# Drains non-interactive RADAR work hourly + in a dedicated night-grind
# window (01:00-05:00 Boston local time) so Titan never stops working when
# Solon's Mac is idle or asleep. Dormant until Solon installs the 1-command
# cron (see plans/PLAN_2026-04-12_vps-scheduler-night-grind.md §4.5).
scheduler:
  scheduler_enabled: false                  # flip true AFTER Solon installs cron
  hourly_drain_cron: "5 * * * *"            # every hour at :05 (off-peak)
  night_grind_start_cron: "7 1 * * *"       # 01:07 Boston local daily
  night_grind_end_local_time: "05:00"       # hard cutoff
  night_grind_max_duration_minutes: 240     # safety cap
  log_file_hourly: "/var/log/titan-scheduler.log"
  log_file_night_grind: "/var/log/titan-night-grind.log"
  # Work type whitelist — only these get auto-drained
  hourly_work_types:
    - "radar_refresh"
    - "alexandria_preflight"
    - "mirror_check"
    - "log_rotation"
    - "health_check"
    - "mcp_heartbeat"
    - "doctrine_regrade"
    - "queue_heartbeat"
    - "sprint_state_audit"
  night_grind_additional_types:
    - "harvest"
    - "mp1_phase"
    - "mp2_phase"
    - "synthesis"
    - "war_room_regrade"
    - "long_research"
    - "backfill_recompute"
  # Night grind relaxes SOFT capacity limits; hard limits unchanged
  night_grind_soft_relaxation:
    max_heavy_tasks: 12                     # up from 8
    max_workers_general: 14                 # up from 10
    max_concurrent_llm_batches: 10          # up from 8

# --- Routing Automations (DOCTRINE_ROUTING_AUTOMATIONS.md, added 2026-04-12) ----
# Routes new work to the right execution engine automatically.
routing:
  enabled: true
  default_engine: "harness"
  engines:
    harness: "Titan harness (~/titan-harness + /opt/titan-harness)"
    computer: "Perplexity Computer (52K credits available)"
    deep_research: "Perplexity Deep Research"
  # Work type → engine (fast-reference table; full doctrine in DOCTRINE_ROUTING_AUTOMATIONS.md)
  routing_table:
    browser_dom_visual_qa: "computer"
    kyc_form_walkthroughs: "computer"
    site_compliance_audit: "computer"
    atlas_skin_polish: "computer"
    loom_asset_capture: "computer"
    competitor_pricing: "deep_research"
    vendor_comparison: "deep_research"
    market_sizing: "deep_research"
    python_bash_sql_git: "harness"
    war_room_grading: "harness"
    cron_systemd: "harness"
    mcp_memory_ops: "harness"
    supabase_migrations: "harness"
    harvester_runs: "harness"
  mandatory_logging: true                   # every delegation → log_decision
  mandatory_marking: true                   # every new plan file tags each step

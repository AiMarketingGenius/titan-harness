<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0F1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Atlas">
  <title>Atlas — AMG</title>
  <link rel="manifest" href="/atlas/manifest.json">
  <link rel="apple-touch-icon" href="/atlas/icon-192.png">
  <link rel="stylesheet" href="/atlas/styles.css">
</head>
<body>
  <main>
    <div id="orb-stage">
      <canvas id="orb-canvas"></canvas>
      <div id="micro-copy" class="micro-copy">Ask me anything about AMG</div>
      <div id="state-chip" class="state-chip">Idle</div>
    </div>

    <section id="transcript" class="transcript" aria-live="polite"></section>

    <form id="text-form" class="text-form">
      <input id="text-input" type="text" autocomplete="off" placeholder="Type or ask aloud…">
      <button type="submit" id="send-btn">Send</button>
      <button type="button" id="mic-btn" aria-pressed="false">🎙</button>
    </form>

    <div id="status-footer" class="status-footer">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">connecting…</span>
    </div>
  </main>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="/atlas/orb.js"></script>
  <script type="module" src="/atlas/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/atlas/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
